kind = "web"
previewPath = "/"
title = "Voto Consciente"
version = "1.0.0"
id = "artifacts/voto-consciente"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21049

[services.development]
run = "pnpm --filter @workspace/voto-consciente run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/voto-consciente", "run", "build" ]
publicDir = "artifacts/voto-consciente/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21049"
BASE_PATH = "/"

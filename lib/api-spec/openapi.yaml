openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat, image, and audio operations
  - name: politicos
    description: Políticos, promessas e realizações
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /politicos:
    get:
      operationId: listPoliticos
      tags: [politicos]
      summary: List politicians with optional filters
      parameters:
        - name: esfera
          in: query
          required: false
          schema:
            type: string
            enum: [federal, estadual, municipal]
        - name: localidade
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of politicians
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Politico"
  /politicos/{id}:
    get:
      operationId: getPolitico
      tags: [politicos]
      summary: Get politician with promises and achievements
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Politician with full details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoliticoComDetalhes"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Politico:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        nomeUrna:
          type: string
        partido:
          type: string
        esfera:
          type: string
          enum: [federal, estadual, municipal]
        localidade:
          type: string
        cargo:
          type: string
        foto:
          type: string
          nullable: true
        urlCamara:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nome
        - nomeUrna
        - partido
        - esfera
        - localidade
        - cargo
        - createdAt
    PromessaPolitico:
      type: object
      properties:
        id:
          type: integer
        politicoId:
          type: integer
        categoria:
          type: string
        descricao:
          type: string
        fonte:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - politicoId
        - categoria
        - descricao
        - createdAt
    RealizacaoPolitico:
      type: object
      properties:
        id:
          type: integer
        politicoId:
          type: integer
        titulo:
          type: string
        descricao:
          type: string
        status:
          type: string
          enum: [Aprovado, "Em tramitação", Arquivado]
        urlOficial:
          type: string
          nullable: true
        ano:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - politicoId
        - titulo
        - descricao
        - status
        - createdAt
    PoliticoComDetalhes:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        nomeUrna:
          type: string
        partido:
          type: string
        esfera:
          type: string
          enum: [federal, estadual, municipal]
        localidade:
          type: string
        cargo:
          type: string
        foto:
          type: string
          nullable: true
        urlCamara:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        promessas:
          type: array
          items:
            $ref: "#/components/schemas/PromessaPolitico"
        realizacoes:
          type: array
          items:
            $ref: "#/components/schemas/RealizacaoPolitico"
      required:
        - id
        - nome
        - nomeUrna
        - partido
        - esfera
        - localidade
        - cargo
        - createdAt
        - promessas
        - realizacoes
